# ledger — path-routed service fragment (dev mirror of prod
# /etc/nginx/conf.d/locations/ledger.conf). Two locations: the unauthenticated PRM
# bootstrap doc, and the authenticated service mount. ledger listens 127.0.0.1:3002.

# Unauthenticated PRM bootstrap — NO auth_request. An MCP client that has no
# token yet must be able to fetch this RFC 9728 doc to discover the AS. The
# exact-match `=` location wins over the `/srv/ledger/` prefix below regardless of
# file order, so this single well-known path stays open while everything else
# under the mount is gated.
location = /srv/ledger/.well-known/oauth-protected-resource {
    proxy_pass http://127.0.0.1:3002/.well-known/oauth-protected-resource;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Authenticated service — every other path under the mount goes through
# auth_request to the dashboard's introspection hook.
location /srv/ledger/ {
    auth_request /_authn;
    auth_request_set $ledger_owner  $upstream_http_x_owner_email;
    auth_request_set $ledger_client $upstream_http_x_client_id;

    # Rate limiting: the introspection endpoint returns 429 when a token is over
    # budget, but nginx's auth_request module only understands 2xx (allow) and
    # 401/403 (deny) — every other subrequest status, 429 included, is collapsed
    # into a synthetic 500. Capture the real subrequest status (and its
    # Retry-After) and intercept that 500 below to re-emit a faithful 429.
    # error_page only catches nginx-internal 500s (proxy_intercept_errors is
    # off), so a genuine 500 from the ledger upstream still passes through untouched.
    auth_request_set $authn_status $upstream_status;
    auth_request_set $authn_retry  $upstream_http_retry_after;
    error_page 500 = @ledger_authn_500;

    # Identity hygiene: `proxy_set_header X-Owner-Email $ledger_owner;` REPLACES the
    # client's inbound X-Owner-Email entirely on the upstream request. nginx does
    # NOT pass inbound client headers as proxy headers unless they are explicitly
    # set, and the last proxy_set_header for a given name wins. So setting each
    # header once, from the auth subrequest variable, is sufficient and safe — a
    # client cannot smuggle identity through. (We deliberately do not add an
    # extra `proxy_set_header X-Owner-Email "";` clear: it would have to come
    # BEFORE the authoritative set to be harmless, and the single set already
    # fully overwrites the inbound value.)
    proxy_set_header X-Owner-Email $ledger_owner;
    proxy_set_header X-Client-Id  $ledger_client;

    proxy_pass http://127.0.0.1:3002/;   # trailing slash strips the /srv/ledger/ mount
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Reached only when auth_request collapsed a non-allow/deny subrequest status to
# 500. If the introspection endpoint actually said 429 (rate limited), surface
# that faithfully with its Retry-After; otherwise it was a real internal error.
location @ledger_authn_500 {
    if ($authn_status = 429) {
        add_header Retry-After $authn_retry always;
        return 429;
    }
    return 500;
}
